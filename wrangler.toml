name = "lp-proxy"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# 环境变量配置（单环境）
# 仅保留社区部署最常需要按需调整的参数。
[vars]

# 代理模式：
# - "anthropic"：OpenAI 格式 <-> Anthropic 格式转换
# - "passthrough"：OpenAI 格式透传到上游兼容接口
PROXY_MODE = "passthrough"

# 上游 API 基础地址。
# anthropic 模式通常为 https://api.anthropic.com
UPSTREAM_BASE_URL = "https://api.daiju.live"

# 模型映射：源模型:目标模型，多个映射用逗号分隔。
# 例如："gpt-4:claude-opus-4-5-20251101"
MODEL_MAPPING = "Lucky-Ai:gpt-5.4"

